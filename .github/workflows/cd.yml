name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          RESPONSE=$(curl -sf -X POST https://api.rnbp.ca/api/deploy-webhook \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"

      - name: Wait for deploy
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3; do
            sleep 5
            if curl -sf https://api.rnbp.ca/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/3 failed, retrying..."
          done
          echo "Health check failed after 3 attempts!"
          exit 1
