name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-api:
    # Hard guard: only run when CI succeeded AND it was triggered from this
    # exact repo (not a fork) AND on the main branch. Self-hosted runners on
    # public repos require multiple layers of defense.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main'
    name: Deploy Backend
    runs-on: [self-hosted, rnbp-prod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Pin to main, never check out the SHA that triggered the run.
          # This prevents a malicious commit from ever landing on the runner.
          ref: main

      - name: Sync working tree to /opt/rnbp/repo
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.deploy.env' \
            ./ /opt/rnbp/repo/

      - name: Install, build and restart
        run: |
          source ~/.nvm/nvm.sh
          cd /opt/rnbp/repo
          pnpm install --frozen-lockfile
          pnpm --filter @rnbp/shared build
          pnpm --filter @rnbp/api build
          sudo systemctl restart rnbp-api

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            sleep 3
            if curl -sf http://localhost:3000/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying..."
          done
          echo "Health check failed!"
          exit 1
