name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @rnbp/shared build

      - name: Type-check API
        run: pnpm --filter @rnbp/api exec tsc --noEmit

      - name: Type-check web
        run: pnpm --filter @rnbp/web exec tsc --noEmit

      - name: Build web
        run: pnpm --filter @rnbp/web build

      - name: Run tests
        run: pnpm test
