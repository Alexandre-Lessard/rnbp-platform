# RNBP API — nginx reverse proxy configuration
# Place at /etc/nginx/sites-available/rnbp and symlink to sites-enabled

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

upstream rnbp_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name api.rnbp.ca;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.rnbp.ca;

    # TLS — Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/api.rnbp.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rnbp.ca/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Limits
    client_max_body_size 12M;

    # Auth endpoints — stricter rate limiting
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://rnbp_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Uploads — static serving
    location /uploads/ {
        alias /opt/rnbp/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Never serve uploads as HTML
        add_header X-Content-Type-Options nosniff always;
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
            application/pdf pdf;
            application/octet-stream *;
        }
        default_type application/octet-stream;
    }

    # Health check — no rate limit
    location = /api/health {
        proxy_pass http://rnbp_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://rnbp_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Deny everything else
    location / {
        return 404;
    }
}
